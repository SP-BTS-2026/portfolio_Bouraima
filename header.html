<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - BOURAIMA Imdad</title>
  <style>
    /* ===============================
        HEADER & NAVIGATION
       =============================== */

    /* Reset de base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background-color: #ffffff; /* FOND BLANC COMPLET */
      color: #000000; /* TEXTE NOIR */
      line-height: 1.6;
    }

    /* HEADER */
    header {
      background-color: #000000; /* Header Noir pour le contraste */
      color: #ffffff; /* Texte Blanc sur fond Noir */
      text-align: center;
      padding: 2.5rem 1rem;
    }

    header h1 {
      font-size: 2.2rem;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    header p {
      font-size: 1rem;
      color: #ffffff;
      opacity: 0.8;
    }

    /* NAVIGATION */
    nav {
      background-color: #ffffff; /* Nav Blanche */
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1.2rem 0;
      border-bottom: 2px solid #000000; /* Ligne noire bien nette */
    }

    nav a {
      color: #000000; /* Liens Noirs */
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    nav a:hover,
    nav a.active {
      color: #666666; /* Gris foncé au survol */
    }

    /* Responsive mobile */
    @media (max-width: 600px) {
      nav {
        flex-wrap: wrap;
        gap: 1rem;
        padding: 1rem;
      }
      
      header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>BOURAIMA Imdad</h1>
  <p>Développeur Web en recherche d’alternance DTA</p>
</header>

<nav>
  <a href="index.html" class="active">Accueil</a>
  <a href="about.html">À propos</a>
  <a href="competences.html">Compétences</a>
  <a href="projets.html">Projets</a>
  <a href="veille.html">Veille</a>
  <a href="contact.html">Contact</a>
</nav>

<main>
  <section style="padding: 2rem; text-align: center;">
    </section>
</main>

</body>
</html>
